# application.yml
server:
  port: 8080 # 默认端口

spring:
  profiles:
    active: dev

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis 配置
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml



# JWT 配置
chatroom:
  jwt:
    admin-secret-key: fsuit_servie_admin
    admin-ttl: 604800000
    admin-token-name: Authorization
    user-secret-key: fsuit_servie_user
    user-ttl: 604800000
    user-token-name: Authorization
jasypt:
  encryptor:
    password: fsuit_servie_chat
